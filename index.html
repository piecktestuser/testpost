<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ระบบเช็กยอดเงินบัตรอาหาร</title>

<style>
*{
    box-sizing:border-box;
    font-family:Segoe UI,Tahoma,sans-serif;
}
body{
    margin:0;
    background:#f3f5f7;
}
.container{
    max-width:700px;
    margin:40px auto;
    background:#fff;
    border-radius:12px;
    box-shadow:0 5px 20px rgba(0,0,0,.15);
    overflow:hidden;
}
.header{
    background:#1976d2;
    color:#fff;
    padding:18px;
    text-align:center;
    font-size:24px;
    font-weight:bold;
}
.section{
    padding:25px;
}
input{
    width:100%;
    padding:12px;
    margin:8px 0 18px;
    font-size:16px;
}
button{
    padding:12px 18px;
    border:none;
    border-radius:6px;
    cursor:pointer;
    font-size:16px;
}
#btnLogin{
    background:#1976d2;
    color:#fff;
}
#btnLogout{
    background:#d32f2f;
    color:#fff;
}
#btnCheck{
    background:#43a047;
    color:#fff;
}
.card{
    margin-top:20px;
    border:1px solid #ddd;
    border-radius:8px;
    padding:20px;
}
.row{
    margin:10px 0;
}
.label{
    display:inline-block;
    width:140px;
    font-weight:bold;
}
.balance{
    color:green;
    font-size:28px;
    font-weight:bold;
}
#checkSection{
    display:none;
}
.loading{color:#1565c0;}
.success{color:green;}
.error{color:red;}
</style>
</head>

<body>

<div class="container">

<div class="header">
ระบบเช็กยอดเงินบัตรอาหาร
</div>

<div class="section" id="loginSection">

<h3>เข้าสู่ระบบ MIS</h3>

<label>Username</label>
<input id="username" placeholder="เช่น t0068">

<label>Password</label>
<input id="password" type="password">

<button id="btnLogin" onclick="login()">
เข้าสู่ระบบ
</button>

<div id="loginStatus"></div>

</div>

<div class="section" id="checkSection">

<div id="loginInfo"></div>

<button id="btnLogout" onclick="logout()">
ออกจากระบบ
</button>

<hr>

<h3>เช็กยอดเงิน</h3>

<input id="keyword" placeholder="รหัสนักเรียน / รหัสครู / รหัสบัตร">

<button id="btnCheck" onclick="check()">
ค้นหา
</button>

<div id="status"></div>

<div class="card">

<div class="row">
<span class="label">ชื่อ</span>
<span id="name">-</span>
</div>

<div class="row">
<span class="label">Member ID</span>
<span id="memberID">-</span>
</div>

<div class="row">
<span class="label">Card No</span>
<span id="cardNo">-</span>
</div>

<div class="row">
<span class="label">ยอดคงเหลือ</span>
<span id="balance" class="balance">-</span> บาท
</div>

</div>

</div>

</div>

<script>

async function login(){

    const memberID=document.getElementById("username").value.trim();
    const password=document.getElementById("password").value;

    if(!memberID||!password){
        alert("กรุณากรอก Username และ Password");
        return;
    }

    const status=document.getElementById("loginStatus");

    status.className="loading";
    status.innerHTML="กำลังเข้าสู่ระบบ...";

    try{

        const res=await fetch("http://localhost:3000/login",{
            method:"POST",
            headers:{
                "Content-Type":"application/json"
            },
            credentials:"include",
            body:JSON.stringify({
                memberID,
                password
            })
        });

        const data=await res.json();

        if(!data.success){
            status.className="error";
            status.innerHTML=data.message;
            return;
        }

        status.innerHTML="";
        document.getElementById("loginSection").style.display="none";
        document.getElementById("checkSection").style.display="block";
        document.getElementById("loginInfo").innerHTML=
            "เข้าสู่ระบบ : "+data.name;

    }catch(err){

        status.className="error";
        status.innerHTML=err.message;

    }

}

async function logout(){

    await fetch("http://localhost:3000/logout",{
        method:"POST",
        credentials:"include"
    });

    document.getElementById("loginSection").style.display="block";
    document.getElementById("checkSection").style.display="none";

    document.getElementById("username").value="";
    document.getElementById("password").value="";
    document.getElementById("keyword").value="";
    document.getElementById("loginStatus").innerHTML="";
    document.getElementById("status").innerHTML="";

}

document.getElementById("keyword").addEventListener("keypress",e=>{
    if(e.key==="Enter"){
        check();
    }
});

async function check(){

    const keyword=document.getElementById("keyword").value.trim();

    if(!keyword){
        alert("กรุณากรอกข้อมูล");
        return;
    }

    const status=document.getElementById("status");

    status.className="loading";
    status.innerHTML="กำลังค้นหา...";

    try{

        const res=await fetch("http://localhost:3000/api/check",{
            method:"POST",
            headers:{
                "Content-Type":"application/json"
            },
            credentials:"include",
            body:JSON.stringify({
                cardNo:keyword
            })
        });

        const data=await res.json();

        if(!data.success){
            status.className="error";
            status.innerHTML=data.message;
            return;
        }

        document.getElementById("name").textContent=data.name;
        document.getElementById("memberID").textContent=data.memberID;
        document.getElementById("cardNo").textContent=data.cardNo;
        document.getElementById("balance").textContent=data.balance;

        status.className="success";
        status.innerHTML="ค้นหาสำเร็จ";

    }catch(err){

        status.className="error";
        status.innerHTML=err.message;

    }

}

</script>

</body>
</html>
